<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP · 거래처 관리</title>
<style>
  :root{
    --ink:#0B1220; --ink-2:#5A6577; --ink-3:#8A94A6;
    --paper:#F2F4F7; --card:#FFFFFF;
    --line:#E5E9EF; --line-2:#EEF1F5;
    --primary:#0A84FF; --primary-soft:rgba(10,132,255,.10);
    --danger:#FF3B30; --danger-soft:rgba(255,59,48,.10);
    --ok:#34C759;
    --shadow:0 1px 2px rgba(11,18,32,.04),0 10px 30px rgba(11,18,32,.07);
    --shadow-sm:0 1px 2px rgba(11,18,32,.05);
    --r:16px; --r-sm:10px;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","Pretendard","Apple SD Gothic Neo",system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;line-height:1.5;letter-spacing:-0.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
  .hidden{display:none!important}

  /* ---------- login ---------- */
  .login{min-height:100vh;display:grid;place-items:center;padding:24px}
  .login-card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:40px 36px;max-width:440px;width:100%;text-align:center}
  .login-logo{width:56px;height:56px;border-radius:16px;background:var(--primary);display:grid;place-items:center;margin:0 auto 20px;box-shadow:0 6px 18px var(--primary-soft)}
  .login-card h1{font-size:24px;font-weight:680;letter-spacing:-0.03em;margin-bottom:8px}
  .login-card p{color:var(--ink-2);font-size:14.5px;margin-bottom:26px;line-height:1.6}
  .btn-primary{background:var(--primary);color:#fff;font-weight:600;font-size:15px;padding:13px 20px;border-radius:12px;width:100%;display:flex;align-items:center;justify-content:center;gap:9px;transition:.15s}
  .btn-primary:hover{filter:brightness(1.05)}
  .btn-primary:active{transform:scale(.99)}
  .note{margin-top:22px;padding-top:18px;border-top:1px solid var(--line-2);text-align:left}
  .note .k{font-size:11.5px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em}
  .redirect-box{font-family:var(--mono);font-size:12px;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-top:7px;word-break:break-all;color:var(--ink-2)}
  .warn{background:var(--danger-soft);color:#B71C10;border-radius:10px;padding:12px 14px;font-size:13px;text-align:left;margin-bottom:18px;line-height:1.5}

  /* ---------- app shell ---------- */
  .topbar{position:sticky;top:0;z-index:20;height:56px;background:rgba(255,255,255,.8);backdrop-filter:saturate(180%) blur(18px);-webkit-backdrop-filter:saturate(180%) blur(18px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 20px}
  .tb-brand{display:flex;align-items:center;gap:9px;font-weight:660;font-size:15px}
  .tb-brand .m{width:26px;height:26px;border-radius:8px;background:var(--primary);display:grid;place-items:center}
  .tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .tb-user{font-size:13px;color:var(--ink-2);display:flex;align-items:center;gap:7px}
  .icon-btn{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--ink-2);transition:.14s}
  .icon-btn:hover{background:var(--paper);color:var(--ink)}

  .shell{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 56px)}
  @media(max-width:820px){.shell{grid-template-columns:1fr}.sidebar{display:none}}
  .sidebar{border-right:1px solid var(--line);padding:16px 12px;background:var(--card)}
  .nav-sec{font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;padding:10px 12px 6px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;font-size:14px;font-weight:520;color:var(--ink-2);transition:.14s;width:100%;text-align:left}
  .nav-item:hover{background:var(--paper);color:var(--ink)}
  .nav-item.on{background:var(--primary-soft);color:var(--primary)}
  .nav-item.soon{opacity:.5;cursor:default}
  .nav-item.soon:hover{background:none}
  .nav-item .tag{margin-left:auto;font-size:10px;font-weight:600;color:var(--ink-3);background:var(--paper);padding:2px 6px;border-radius:5px}
  .nav-item svg{width:18px;height:18px;flex:0 0 auto}

  .main{padding:26px 28px;overflow:auto}
  .page-head{display:flex;align-items:center;margin-bottom:22px}
  .page-head h2{font-size:22px;font-weight:680;letter-spacing:-0.02em}
  .page-head .count{margin-left:10px;font-size:13px;color:var(--ink-3);background:var(--card);border:1px solid var(--line);padding:3px 10px;border-radius:99px}
  .page-head .sp{flex:1}

  /* ---------- two column ---------- */
  .cols{display:grid;grid-template-columns:380px 1fr;gap:20px;align-items:start}
  @media(max-width:980px){.cols{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm)}

  .list-head{padding:14px 16px;border-bottom:1px solid var(--line-2);display:flex;gap:8px;align-items:center}
  .search{flex:1;display:flex;align-items:center;gap:8px;background:var(--paper);border-radius:9px;padding:8px 11px}
  .search input{border:none;background:none;outline:none;width:100%}
  .search svg{width:16px;height:16px;color:var(--ink-3);flex:0 0 auto}
  .btn-add{background:var(--primary);color:#fff;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto;transition:.14s}
  .btn-add:hover{filter:brightness(1.05)}

  .list{max-height:calc(100vh - 240px);overflow:auto;padding:6px}
  .list-item{padding:11px 12px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:11px;transition:.12s}
  .list-item:hover{background:var(--paper)}
  .list-item.on{background:var(--primary-soft)}
  .avatar{width:36px;height:36px;border-radius:10px;background:var(--paper);display:grid;place-items:center;font-weight:640;font-size:14px;color:var(--ink-2);flex:0 0 auto}
  .list-item.on .avatar{background:#fff;color:var(--primary)}
  .li-body{min-width:0;flex:1}
  .li-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .li-sub{font-size:12px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pill{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:6px;flex:0 0 auto}
  .pill.buy{background:#FFF1E6;color:#C05617}
  .pill.sell{background:#E7F6EC;color:#1E7A3E}
  .empty{padding:40px 20px;text-align:center;color:var(--ink-3);font-size:13.5px}

  /* ---------- detail form ---------- */
  .detail{padding:22px 24px}
  .detail-empty{padding:60px 24px;text-align:center;color:var(--ink-3)}
  .detail-empty svg{width:44px;height:44px;color:var(--line);margin-bottom:14px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);outline:none;transition:.14s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .field textarea{resize:vertical;min-height:64px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:560px){.grid2{grid-template-columns:1fr}}
  .form-actions{display:flex;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid var(--line-2)}
  .btn{padding:11px 18px;border-radius:10px;font-weight:600;font-size:14px;transition:.14s}
  .btn.save{background:var(--primary);color:#fff;flex:1}
  .btn.save:hover{filter:brightness(1.05)}
  .btn.del{background:var(--danger-soft);color:var(--danger)}
  .btn.del:hover{background:var(--danger);color:#fff}
  .btn.ghost{background:var(--paper);color:var(--ink-2)}

  /* ---------- toast ---------- */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:520;box-shadow:var(--shadow);opacity:0;transition:.25s;z-index:100;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>

<script>
/* =====================================================================
   설정 — Dropbox 앱 콘솔에서 발급받은 App key를 아래에 붙여넣으세요.
   https://www.dropbox.com/developers/apps
   ===================================================================== */
const DROPBOX_APP_KEY = "uy4mukymihfjf1o";

/* ---------- 상수 ---------- */
const REDIRECT_URI = window.location.origin + window.location.pathname.replace(/index\.html$/, "");
const DATA_DIR = "/erp";
const SCOPES = "account_info.read files.content.read files.content.write";
const LS = { access:"dbx_access", refresh:"dbx_refresh", exp:"dbx_exp", verifier:"dbx_verifier" };

/* ---------- PKCE 유틸 ---------- */
function b64url(bytes){ return btoa(String.fromCharCode(...bytes)).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function randomVerifier(){ const a=new Uint8Array(64); crypto.getRandomValues(a); return b64url(a); }
async function challenge(verifier){ const d=new TextEncoder().encode(verifier); const h=await crypto.subtle.digest("SHA-256",d); return b64url(new Uint8Array(h)); }

/* ---------- 인증 ---------- */
async function startLogin(){
  if(!DROPBOX_APP_KEY){ showKeyWarn(); return; }
  const verifier=randomVerifier();
  localStorage.setItem(LS.verifier,verifier);
  const chal=await challenge(verifier);
  const url=new URL("https://www.dropbox.com/oauth2/authorize");
  url.searchParams.set("client_id",DROPBOX_APP_KEY);
  url.searchParams.set("response_type","code");
  url.searchParams.set("code_challenge",chal);
  url.searchParams.set("code_challenge_method","S256");
  url.searchParams.set("redirect_uri",REDIRECT_URI);
  url.searchParams.set("token_access_type","offline");
  url.searchParams.set("scope",SCOPES);
  window.location.href=url.toString();
}

async function exchangeCode(code){
  const verifier=localStorage.getItem(LS.verifier);
  const body=new URLSearchParams({
    code, grant_type:"authorization_code", client_id:DROPBOX_APP_KEY,
    redirect_uri:REDIRECT_URI, code_verifier:verifier
  });
  const res=await fetch("https://api.dropboxapi.com/oauth2/token",{
    method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"}, body
  });
  if(!res.ok) throw new Error("토큰 교환 실패");
  const t=await res.json();
  saveTokens(t);
}

function saveTokens(t){
  if(t.access_token) localStorage.setItem(LS.access,t.access_token);
  if(t.refresh_token) localStorage.setItem(LS.refresh,t.refresh_token);
  if(t.expires_in) localStorage.setItem(LS.exp, String(Date.now()+t.expires_in*1000));
}

async function refreshToken(){
  const rt=localStorage.getItem(LS.refresh);
  if(!rt) return false;
  const body=new URLSearchParams({ grant_type:"refresh_token", refresh_token:rt, client_id:DROPBOX_APP_KEY });
  const res=await fetch("https://api.dropboxapi.com/oauth2/token",{ method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"}, body });
  if(!res.ok) return false;
  saveTokens(await res.json());
  return true;
}

async function ensureToken(){
  const exp=Number(localStorage.getItem(LS.exp)||0);
  if(Date.now() > exp-60000){ await refreshToken(); }
  return localStorage.getItem(LS.access);
}

function logout(){
  [LS.access,LS.refresh,LS.exp,LS.verifier].forEach(k=>localStorage.removeItem(k));
  location.href=REDIRECT_URI;
}

/* ---------- Dropbox API ---------- */
async function dbxDownload(path){
  const token=await ensureToken();
  const res=await fetch("https://content.dropboxapi.com/2/files/download",{
    method:"POST",
    headers:{ "Authorization":"Bearer "+token, "Dropbox-API-Arg":JSON.stringify({path}) }
  });
  if(res.status===409) return null;             // 파일 없음
  if(!res.ok) throw new Error("다운로드 실패 "+res.status);
  return await res.text();
}
async function dbxUpload(path,content){
  const token=await ensureToken();
  const res=await fetch("https://content.dropboxapi.com/2/files/upload",{
    method:"POST",
    headers:{
      "Authorization":"Bearer "+token,
      "Dropbox-API-Arg":JSON.stringify({path,mode:"overwrite",mute:true}),
      "Content-Type":"application/octet-stream"
    },
    body:content
  });
  if(!res.ok) throw new Error("업로드 실패 "+res.status);
  return await res.json();
}
async function dbxAccount(){
  const token=await ensureToken();
  const res=await fetch("https://api.dropboxapi.com/2/users/get_current_account",{
    method:"POST", headers:{ "Authorization":"Bearer "+token }
  });
  if(!res.ok) return null;
  return await res.json();
}

/* ---------- 데이터 계층 (테이블 = JSON 파일) ---------- */
const Table = {
  async load(name){
    const txt=await dbxDownload(`${DATA_DIR}/${name}.json`);
    return txt ? JSON.parse(txt) : [];
  },
  async save(name,rows){
    await dbxUpload(`${DATA_DIR}/${name}.json`, JSON.stringify(rows,null,2));
  }
};

/* =====================================================================
   거래처(companies) 모듈
   ===================================================================== */
let companies=[];
let selectedId=null;
let filter="";

async function loadCompanies(){
  toast("불러오는 중…",true);
  try{
    companies=await Table.load("companies");
    renderList(); renderDetail();
    toast("");
  }catch(e){ toast("불러오기 실패: "+e.message); }
}

async function saveCompanies(){
  toast("저장 중…",true);
  try{ await Table.save("companies",companies); toast("저장했습니다"); }
  catch(e){ toast("저장 실패: "+e.message); }
}

function initials(name){ return (name||"?").trim().slice(0,2); }

function renderList(){
  const q=filter.trim().toLowerCase();
  const rows=companies
    .filter(c=>!q || (c.name||"").toLowerCase().includes(q) || (c.contact||"").toLowerCase().includes(q))
    .sort((a,b)=>(a.name||"").localeCompare(b.name||"","ko"));
  document.getElementById("coCount").textContent=companies.length+"곳";
  const list=document.getElementById("list");
  if(rows.length===0){
    list.innerHTML=`<div class="empty">${companies.length? "검색 결과가 없습니다." : "아직 등록된 거래처가 없습니다.<br>+ 버튼으로 첫 거래처를 추가해 보세요."}</div>`;
    return;
  }
  list.innerHTML=rows.map(c=>`
    <div class="list-item ${c.id===selectedId?'on':''}" data-id="${c.id}">
      <div class="avatar">${escapeHtml(initials(c.name))}</div>
      <div class="li-body">
        <div class="li-name">${escapeHtml(c.name||"(이름 없음)")}</div>
        <div class="li-sub">${escapeHtml(c.contact||c.phone||c.biz_no||"—")}</div>
      </div>
      ${c.type==="매입"?'<span class="pill buy">매입</span>':c.type==="매출"?'<span class="pill sell">매출</span>':''}
    </div>`).join("");
  list.querySelectorAll(".list-item").forEach(el=>{
    el.onclick=()=>{ selectedId=el.dataset.id; renderList(); renderDetail(); };
  });
}

function blankCompany(){
  return { id:null, name:"", biz_no:"", type:"매출", contact:"", phone:"", email:"", address:"", memo:"" };
}

function renderDetail(){
  const empty=document.getElementById("detailEmpty");
  const form=document.getElementById("detailForm");
  const c = selectedId==="__new__" ? blankCompany() : companies.find(x=>x.id===selectedId);
  if(!c){ empty.classList.remove("hidden"); form.classList.add("hidden"); return; }
  empty.classList.add("hidden"); form.classList.remove("hidden");
  const isNew = selectedId==="__new__";
  form.innerHTML=`
    <div class="field"><label>상호 *</label><input id="f_name" value="${escapeAttr(c.name)}" placeholder="예: 한빛유통"></div>
    <div class="grid2">
      <div class="field"><label>구분</label>
        <select id="f_type">
          <option ${c.type==="매출"?"selected":""}>매출</option>
          <option ${c.type==="매입"?"selected":""}>매입</option>
        </select>
      </div>
      <div class="field"><label>사업자번호</label><input id="f_biz" value="${escapeAttr(c.biz_no)}" placeholder="000-00-00000"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>담당자</label><input id="f_contact" value="${escapeAttr(c.contact)}"></div>
      <div class="field"><label>연락처</label><input id="f_phone" value="${escapeAttr(c.phone)}"></div>
    </div>
    <div class="field"><label>이메일</label><input id="f_email" value="${escapeAttr(c.email)}"></div>
    <div class="field"><label>주소</label><input id="f_address" value="${escapeAttr(c.address)}"></div>
    <div class="field"><label>메모</label><textarea id="f_memo" placeholder="특이사항, 결제조건 등">${escapeHtml(c.memo)}</textarea></div>
    <div class="form-actions">
      <button class="btn save" id="btnSave">${isNew?"등록":"저장"}</button>
      ${isNew?'<button class="btn ghost" id="btnCancel">취소</button>':'<button class="btn del" id="btnDel">삭제</button>'}
    </div>`;
  document.getElementById("btnSave").onclick=()=>submitForm(c,isNew);
  if(isNew) document.getElementById("btnCancel").onclick=()=>{ selectedId=null; renderList(); renderDetail(); };
  else document.getElementById("btnDel").onclick=()=>deleteCompany(c.id);
}

async function submitForm(c,isNew){
  const name=document.getElementById("f_name").value.trim();
  if(!name){ toast("상호를 입력하세요"); return; }
  const data={
    name,
    type:document.getElementById("f_type").value,
    biz_no:document.getElementById("f_biz").value.trim(),
    contact:document.getElementById("f_contact").value.trim(),
    phone:document.getElementById("f_phone").value.trim(),
    email:document.getElementById("f_email").value.trim(),
    address:document.getElementById("f_address").value.trim(),
    memo:document.getElementById("f_memo").value.trim(),
  };
  if(isNew){
    const row={ id:crypto.randomUUID(), ...data, created_at:new Date().toISOString() };
    companies.push(row); selectedId=row.id;
  }else{
    Object.assign(c,data);
  }
  renderList(); renderDetail();
  await saveCompanies();
}

async function deleteCompany(id){
  if(!confirm("이 거래처를 삭제할까요? 되돌릴 수 없습니다.")) return;
  companies=companies.filter(c=>c.id!==id);
  selectedId=null; renderList(); renderDetail();
  await saveCompanies();
}

/* ---------- helpers ---------- */
function escapeHtml(s){ return (s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }
function escapeAttr(s){ return escapeHtml(s).replace(/'/g,"&#39;"); }
let toastTimer=null;
function toast(msg,loading){
  const t=document.getElementById("toast");
  if(!msg){ t.classList.remove("show"); return; }
  t.innerHTML=(loading?'<span class="spin"></span> ':'')+escapeHtml(msg);
  t.classList.add("show");
  clearTimeout(toastTimer);
  if(!loading) toastTimer=setTimeout(()=>t.classList.remove("show"),1800);
}
function showKeyWarn(){
  const w=document.getElementById("keyWarn");
  w.classList.remove("hidden");
  w.innerHTML="⚠️ App key가 아직 입력되지 않았습니다. 코드 상단의 <b>DROPBOX_APP_KEY</b>에 Dropbox 앱 콘솔의 App key를 붙여넣어 주세요.";
}

/* =====================================================================
   초기화
   ===================================================================== */
async function init(){
  document.getElementById("redirectUri").textContent=REDIRECT_URI;

  // OAuth 콜백 처리
  const params=new URLSearchParams(location.search);
  if(params.get("code")){
    try{
      await exchangeCode(params.get("code"));
      history.replaceState({}, "", REDIRECT_URI); // ?code= 제거
    }catch(e){ alert("로그인에 실패했습니다. 다시 시도해 주세요."); }
  }

  // 이벤트 연결
  document.getElementById("connectBtn").onclick=startLogin;
  document.getElementById("logoutBtn").onclick=logout;
  document.getElementById("refreshBtn").onclick=loadCompanies;
  document.getElementById("newBtn").onclick=()=>{ selectedId="__new__"; renderList(); renderDetail(); };
  document.getElementById("searchInput").oninput=(e)=>{ filter=e.target.value; renderList(); };

  // 로그인 상태 확인
  const token=await ensureToken();
  if(token){
    document.getElementById("loginView").classList.add("hidden");
    document.getElementById("appView").classList.remove("hidden");
    const acc=await dbxAccount();
    if(acc){ document.getElementById("tbUser").innerHTML=
      `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> ${escapeHtml(acc.name?.display_name||"")}`; }
    await loadCompanies();
  }
}
init();
</script>
